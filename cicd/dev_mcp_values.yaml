release:
  namespace: mcp
replicaCount: 1

image:
  repository: 445567097238.dkr.ecr.ap-south-1.amazonaws.com/offlinepaymentuat
  pullPolicy: IfNotPresent
  tag: "mcp"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: "mcp"

service:
  type: ClusterIP
  port: 8000

resources:
   limits:
     cpu: 1.5
     memory: 4Gi
   requests:
     cpu: 600m
     memory: 2Gi
  
# profile:
#  - name: "ENV_ACTIVE_PROFILE"
#    value: "test"
#  - name: "Djasypt.encryptor.password"
#    value: "p!neL@bs"  

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
         
readinessProbe: 
  failureThreshold: 3 
  httpGet:
    path: "/metrics/health" 
    port: 8080 
    scheme: HTTP 
  initialDelaySeconds: 60
  periodSeconds: 10 
  successThreshold: 1
  timeoutSeconds: 5 
    
ServiceAccountName: "mcp"

serviceAccount:
  create: false
  annotations: {}
  name: ""

podAnnotations: {}
podSecurityContext: {}
securityContext: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

nodeSelector: {}
tolerations: []
affinity: {}
